<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MiniPOS - Quét mã vạch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; }
    #reader { width: 100%; max-width: 500px; margin: 0 auto; }
    #result { padding: 16px; text-align: center; background: #1a1a2e; }
    .success { color: #4ade80; font-size: 1.2rem; font-weight: 700; }
    .error { color: #f87171; }
    .product-info { background: #16213e; margin: 12px; padding: 16px; border-radius: 12px; }
    .product-name { font-size: 1.3rem; font-weight: 700; }
    .product-price { font-size: 1.5rem; color: #fbbf24; font-weight: 700; margin-top: 8px; }
    .product-stock { color: #94a3b8; margin-top: 4px; }
    .status-bar { padding: 12px; text-align: center; background: #1a1a2e; font-size: 0.85rem; color: #94a3b8; }
    .header { padding: 16px; text-align: center; background: #1a1a2e; border-bottom: 1px solid #2d2d5e; }
    .header h2 { font-size: 1.1rem; font-weight: 600; }
    .header p { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
    .scan-history { margin: 12px; }
    .scan-history h3 { font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; }
    .scan-item { background: #16213e; padding: 10px 16px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .scan-item .name { font-weight: 600; }
    .scan-item .price { color: #fbbf24; font-weight: 600; }
    .scan-item .time { font-size: 0.75rem; color: #64748b; }
    #scanCount { display: inline-block; background: #4ade80; color: #000; padding: 2px 8px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; margin-left: 8px; }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-reset { background: #ef4444; color: #fff; width: 100%; margin: 12px 0; }
    .btn-back { background: #3b82f6; color: #fff; width: calc(100% - 24px); margin: 0 12px 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h2>MiniPOS - Quét Mã Vạch <span id="scanCount">0</span></h2>
    <p>Hướng camera vào mã vạch để quét</p>
  </div>
  <div id="reader"></div>
  <div id="result"></div>
  <div class="scan-history" id="history"></div>
  <button class="btn-back" onclick="goBack()">← Quay lại POS</button>
  <button class="btn-reset" onclick="clearHistory()">Xóa lịch sử quét</button>
  <div class="status-bar" id="status">Đang khởi tạo camera...</div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js">
  </script>
  <script>
    // === CẤU HÌNH ==============================================
    // Thay URL này bằng Web App URL của Apps Script sau khi deploy
    var APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';

    // === STATE =================================================
    var scans = [];
    var lastBarcode = '';
    var lastScanTime = 0;
    var DEBOUNCE_MS = 3000;

    // === KHỞI TẠO SCANNER =====================================
    function initScanner() {
      var html5QrcodeScanner = new Html5Qrcode("reader");
      var config = { fps: 10, qrbox: { width: 250, height: 150 }, aspectRatio: 1.0 };

      html5QrcodeScanner.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanError
      ).then(function() {
        setStatus('Camera sẵn sàng');
      }).catch(function(err) {
        setStatus('Lỗi camera: ' + err.message);
        document.getElementById('reader').innerHTML = '<p style="padding:40px;text-align:center;color:#f87171;">Không thể truy cập camera.<br>Vui lòng cho phép quyền camera và tải lại trang.</p>';
      });
    }

    function onScanSuccess(decodedText, decodedResult) {
      // Debounce: bỏ qua quét trùng trong 3 giây
      if (decodedText === lastBarcode && Date.now() - lastScanTime < DEBOUNCE_MS) return;
      lastBarcode = decodedText;
      lastScanTime = Date.now();

      // Phát âm thanh beep
      playBeep();

      // Gửi barcode về Apps Script
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ barcode: decodedText, timestamp: new Date().toISOString() })
      }).catch(function() {});

      // Lấy thông tin sản phẩm
      fetch(APPS_SCRIPT_URL + '?action=lookup&barcode=' + encodeURIComponent(decodedText))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          showResult(data, decodedText);
        })
        .catch(function() {
          showResult({ success: false, message: 'Không kết nối được server' }, decodedText);
        });
    }

    function onScanError(errorMessage) {
      // Bỏ qua lỗi quét liên tục (html5-qrcode bắn lỗi mỗi frame)
    }

    function playBeep() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.1;
        osc.start(0);
        osc.stop(0.1);
      } catch(e) {}
    }

    function showResult(data, barcode) {
      var el = document.getElementById('result');
      if (data.success && data.product) {
        var p = data.product;
        scans.unshift({ name: p.name, price: p.sellingPrice, barcode: barcode, time: new Date().toLocaleTimeString('vi-VN') });
        if (scans.length > 20) scans.pop();
        el.innerHTML =
          '<div class="product-info">' +
          '<div class="product-name">' + p.name + '</div>' +
          '<div class="product-price">' + p.sellingPrice.toLocaleString('vi-VN') + 'đ / ' + (p.unit || 'cái') + '</div>' +
          '<div class="product-stock">Tồn kho: ' + p.stock + ' | SKU: ' + (p.sku || '-') + '</div>' +
          '</div>';
      } else {
        el.innerHTML = '<div class="error" style="padding:20px;text-align:center;">' +
          'Không tìm thấy: <strong>' + barcode + '</strong><br>' +
          '<small>Hãy thêm sản phẩm với mã vạch này trong POS</small></div>';
      }
      updateHistory();
      updateScanCount();
    }

    function updateHistory() {
      var el = document.getElementById('history');
      if (scans.length === 0) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = '<h3>Lịch sử quét</h3>' +
        scans.map(function(s) {
          return '<div class="scan-item"><div><div class="name">' + s.name + '</div><div class="time">' + s.time + '</div></div><div class="price">' + s.price.toLocaleString('vi-VN') + 'đ</div></div>';
        }).join('');
    }

    function updateScanCount() {
      document.getElementById('scanCount').innerText = scans.length;
    }

    function clearHistory() {
      scans = [];
      updateHistory();
      updateScanCount();
      document.getElementById('result').innerHTML = '';
    }

    function setStatus(msg) {
      document.getElementById('status').innerText = msg;
    }

    function goBack() {
      try {
        window.opener ? window.close() : history.back();
      } catch(e) {
        history.back();
      }
    }

    // === START =================================================
    initScanner();
  </script>
</body>
</html>
